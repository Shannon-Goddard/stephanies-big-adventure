<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/apple-touch.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch.png">
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<title>Stephanie's Big Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: url('assets/img/background-image.png') center/contain no-repeat;
    background-color: #000;
  }
  .title {
    position: absolute;
    top: 10%;
    left: 50%;
    max-width: 40vw;
    z-index: 1;
    opacity: 0;
    transform: translateX(-50%) scale(0);
    animation: titleEntrance 1s ease-out forwards, float 3s ease-in-out 1s infinite;
  }
  .bike {
    position: absolute;
    bottom: 10%;
    left: 10%;
    max-width: 30vw;
    z-index: 2;

  }
  @keyframes titleEntrance {
    to { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  @keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-20px); }
  }
  .btn {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    padding: 1em 2em;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
    color: #000;
    background: #f5f0e1;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 6px 6px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 8px 8px 0 #000;
  }
  .btn:active {
    transform: translateX(-50%) scale(0.97);
    box-shadow: 3px 3px 0 #000;
  }
  @keyframes flyout {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(150vw, -150vh) rotate(-25deg); }
  }
  @media (max-width: 1024px) and (orientation: landscape) {
    body { background-size: cover; }
    .title { max-width: 70vw; }
    .bike { max-width: 50vw; bottom: 5%; left: 5%; }
  }
  @media (max-width: 1024px) and (orientation: portrait) {
    body { background-image: url('assets/img/background-image-portrait.png'); background-size: cover; }
    .title { max-width: 140vw; }
    .bike { max-width: 100vw; bottom: 5%; left: 5%; }
    .btn { bottom: auto; top: 50%; transform: translate(-50%, -50%); }
    .btn:hover { transform: translate(-50%, -50%) scale(1.05); }
    .btn:active { transform: translate(-50%, -50%) scale(0.97); }
  }
</style>
</head>
<body>
  <img class="title" src="assets/img/title.png" alt="Title">
  <img class="bike" src="assets/img/bike.png" alt="Bike">
  <button class="btn" onclick="playBell();document.querySelector('.bike').style.animation='flyout 8s ease-in forwards'">Coming Soon</button>
  <script>
    const playBell = () => {
      const context = new (window.AudioContext || window.webkitAudioContext)();
      [2000, 2100].forEach((freq, i) => {
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, context.currentTime + (i * 0.1));
        gain.gain.setValueAtTime(0.5, context.currentTime + (i * 0.1));
        gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + (i * 0.1) + 0.5);
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start(context.currentTime + (i * 0.1));
        osc.stop(context.currentTime + (i * 0.1) + 0.5);
      });
    };
  </script>
</body>
</html>
