<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/apple-touch.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch.png">
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<title>The Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
  }
  .bg {
    position: absolute;
    width: 200vw;
    height: 200vh;
    top: 0;
    left: 0;
    background: url('assets/img/map.png') 0 0 / 100% 100% no-repeat;
    transition: top 1.5s ease-in-out, left 1.5s ease-in-out;
  }
  .quadrant {
    position: absolute;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .q1 { top: 0; left: 0; }
  .q2 { top: 0; left: 100vw; }
  .q3 { top: 100vh; left: 0; }
  .q4 { top: 100vh; left: 100vw; }
  .overlay, .video-overlay {
    position: absolute;
    max-width: 70vw;
    max-height: 70vh;
    z-index: 1;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    pointer-events: none;
  }
  .overlay.show { opacity: 0.5; }
  .video-overlay.show { opacity: 0.5; }
  .video-overlay {
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at center, black 50%, transparent 100%);
    mask-image: radial-gradient(ellipse 80% 80% at center, black 50%, transparent 100%);
  }
  .btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    padding: 1em 2em;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
    color: #000;
    background: #ffd700;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 6px 6px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.5s;
  }
  .btn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 8px 8px 0 #000;
  }
  .btn:active {
    transform: translate(-50%, -50%) scale(0.97);
    box-shadow: 3px 3px 0 #000;
  }
  .back-btn {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 50;
    padding: 0.4em 0.9em;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
    font-size: clamp(0.7rem, 2vw, 1rem);
    color: #000;
    background: #f5f0e1;
    border: 3px solid #000;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 3px 3px 0 #000;
    text-decoration: none;
    display: inline-block;
  }
  .back-btn:hover { transform: scale(1.05); }
  .back-btn:active { transform: scale(0.97); }
</head>
<body>
  <a class="back-btn" href="index.html">← I'm Bad At Maps</a>
  <div class="bg" id="bg">
    <div class="quadrant q1">
      <img class="overlay" id="o1" src="assets/img/map1.png" alt="Panel 1">
      <video class="video-overlay" id="v1" src="assets/webm/goonies-clip.webm" muted playsinline></video>
    </div>
    <div class="quadrant q2">
      <img class="overlay" id="o2" src="assets/img/map2.png" alt="Panel 2">
      <video class="video-overlay" id="v2" src="assets/webm/adventure-clip.webm" muted playsinline></video>
    </div>
    <div class="quadrant q3">
      <img class="overlay" id="o3" src="assets/img/map3.png" alt="Panel 3">
      <video class="video-overlay" id="v3" src="assets/webm/indiana-jones-clip.webm" muted playsinline></video>
    </div>
    <div class="quadrant q4">
      <img class="overlay" id="o4" src="assets/img/map4.png" alt="Panel 4">
      <video class="video-overlay" id="v4" src="assets/webm/big-trouble-clip.webm" muted playsinline></video>
    </div>
  </div>
  <button class="btn" id="startBtn">Open The Map 🗺️</button>
  <button class="btn" id="endBtn" style="opacity:0;pointer-events:none">Super important detail. Pay attention.</button>
  <audio id="theme" src="assets/mp3/indiana-jones-theme.mp3" loop></audio>
  <audio id="goonies" src="assets/mp3/goonies-hey-you-guys.mp3"></audio>
  <script>
    document.getElementById('startBtn').addEventListener('click', function() {
      const bg = document.getElementById('bg');
      const music = document.getElementById('theme');
      const overlays = [
        document.getElementById('o1'),
        document.getElementById('o2'),
        document.getElementById('o3'),
        document.getElementById('o4')
      ];
      const videos = [
        document.getElementById('v1'),
        document.getElementById('v2'),
        document.getElementById('v3'),
        document.getElementById('v4')
      ];
      const btn = this;

      music.play();
      btn.style.opacity = '0';
      btn.style.pointerEvents = 'none';

      const pans = [
        { left: '0', top: '0' },
        { left: '-100vw', top: '0' },
        { left: '0', top: '-100vh' },
        { left: '-100vw', top: '-100vh' },
      ];
      const hold = 6500;
      const fade = 2000;

      // Show first image, then swap to video
      overlays[0].classList.add('show');
      setTimeout(() => {
        overlays[0].classList.remove('show');
        videos[0].classList.add('show');
        videos[0].play();
      }, fade);

      for (let i = 1; i < pans.length; i++) {
        // Pan to next quadrant
        setTimeout(() => {
          bg.style.left = pans[i].left;
          bg.style.top = pans[i].top;
          // Fade in image, then swap to video
          setTimeout(() => {
            overlays[i].classList.add('show');
            setTimeout(() => {
              overlays[i].classList.remove('show');
              videos[i].classList.add('show');
              videos[i].play();
            }, fade);
          }, 1500);
        }, hold * i);
      }

      // Fade out last video after 3s, then show end button
      setTimeout(() => {
        setTimeout(() => {
          videos[pans.length - 1].classList.remove('show');
        }, 3000);
        setTimeout(() => {
          const endBtn = document.getElementById('endBtn');
          endBtn.style.opacity = '1';
          endBtn.style.pointerEvents = 'auto';
          let clickCount = 0;
          endBtn.addEventListener('click', () => {
            music.volume = 0.2;
            const goonies = document.getElementById('goonies');
            goonies.currentTime = 0;
            goonies.volume = 1.0;
            goonies.play();
            clickCount++;
            if (clickCount === 1) {
              endBtn.textContent = "Okay. You're ready. Click me";
            } else if (clickCount === 2) {
              endBtn.textContent = 'Okay. Serious this time. Let\'s go';
            } else {
              window.location.href = 'mission.html';
            }
          });
        }, fade);
      }, hold * pans.length - fade);
    });
  </script>
</body>
</html>
