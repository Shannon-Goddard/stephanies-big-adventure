<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/apple-touch.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch.png">
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<title>The Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
  }
  .bg {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background: url('assets/img/map.png') 0% 0% / 200% 200% no-repeat;
    transition: background-position 1.5s ease-in-out;
  }
  .overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 70vw;
    max-height: 70vh;
    z-index: 1;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    pointer-events: none;
  }
  .overlay.show { opacity: 1; }
  .btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    padding: 1em 2em;
    font-family: 'Bangers', 'Comic Sans MS', cursive;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
    color: #000;
    background: #ffd700;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 6px 6px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.5s;
  }
  .btn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 8px 8px 0 #000;
  }
  .btn:active {
    transform: translate(-50%, -50%) scale(0.97);
    box-shadow: 3px 3px 0 #000;
  }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <img class="overlay" id="o1" src="assets/img/map1.png" alt="Panel 1">
  <img class="overlay" id="o2" src="assets/img/map2.png" alt="Panel 2">
  <img class="overlay" id="o3" src="assets/img/map3.png" alt="Panel 3">
  <img class="overlay" id="o4" src="assets/img/map4.png" alt="Panel 4">
  <button class="btn" id="startBtn">Open The Map 🗺️</button>
  <button class="btn" id="endBtn" style="opacity:0;pointer-events:none">To Be Continued...</button>
  <audio id="theme" src="assets/mp3/indiana-jones-theme.mp3" loop></audio>
  <audio id="goonies" src="assets/mp3/goonies-hey-you-guys.mp3"></audio>
  <script>
    document.getElementById('startBtn').addEventListener('click', function() {
      const bg = document.getElementById('bg');
      const music = document.getElementById('theme');
      const overlays = [
        document.getElementById('o1'),
        document.getElementById('o2'),
        document.getElementById('o3'),
        document.getElementById('o4')
      ];
      const btn = this;

      music.play();
      btn.style.opacity = '0';
      btn.style.pointerEvents = 'none';

      const positions = ['0% 0%', '100% 0%', '0% 100%', '100% 100%'];
      const hold = 6500;
      const fade = 2000;

      // Show first overlay immediately
      overlays[0].classList.add('show');

      for (let i = 1; i < positions.length; i++) {
        // Fade out current overlay
        setTimeout(() => {
          overlays[i - 1].classList.remove('show');
        }, hold * i - fade);

        // Pan background then fade in next overlay
        setTimeout(() => {
          bg.style.backgroundPosition = positions[i];
          setTimeout(() => {
            overlays[i].classList.add('show');
          }, 1500); // wait for pan to finish
        }, hold * i);
      }

      // Fade out last overlay, then show end button
      setTimeout(() => {
        overlays[positions.length - 1].classList.remove('show');
        setTimeout(() => {
          const endBtn = document.getElementById('endBtn');
          endBtn.style.opacity = '1';
          endBtn.style.pointerEvents = 'auto';
          endBtn.addEventListener('click', () => {
            music.volume = 0.2;
            const goonies = document.getElementById('goonies');
            goonies.volume = 1.0;
            goonies.play();
          });
        }, fade);
      }, hold * positions.length - fade);
    });
  </script>
</body>
</html>
